<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Painel Paula Ortolani</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1c1e21;font-size:13px}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:12px}
#header{background:#fff;border-bottom:1px solid #e0e3e8;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#header-left{display:flex;align-items:center;gap:10px}
#logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#4285f4,#a142f4);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:15px}
#title-name{font-weight:800;font-size:15px}
#title-sub{font-size:11px;color:#9aa0a6}
#nav{display:flex;gap:4px}
.nav-btn{padding:5px 13px;border:none;border-radius:7px;font-size:12px;font-weight:700;background:transparent;color:#5f6368;transition:all .15s}
.nav-btn.active{background:#e8f0fe;color:#1a56cc}
#content{max-width:1200px;margin:0 auto;padding:20px}
#toast{position:fixed;top:18px;right:18px;z-index:9999;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13px;box-shadow:0 4px 18px rgba(0,0,0,.2);display:none}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.kpi{border-radius:12px;padding:14px 16px}
.kpi-val{font-size:26px;font-weight:900}
.kpi-lbl{font-size:11px;font-weight:600;opacity:.85}
.card{background:#fff;border-radius:14px;padding:18px;border:1px solid #e0e3e8;margin-bottom:16px}
.card-title{font-weight:800;font-size:14px;margin-bottom:14px}
.prog-wrap{display:flex;align-items:center;gap:6px;min-width:90px}
.prog-track{flex:1;height:5px;background:#e8eaed;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}
.prog-pct{font-size:10px;color:#5f6368;min-width:24px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.alert-badge{border-radius:10px;padding:1px 7px;font-size:10px;font-weight:800}
.proj-row{display:flex;align-items:center;padding:11px 14px;gap:10px;background:#1a3a5c;cursor:pointer}
.proj-row:hover{background:#1e4470}
.proj-num{font-size:11px;background:rgba(255,255,255,.1);color:#ccc;padding:1px 7px;border-radius:6px;font-weight:700}
.proj-nome{flex:1;font-weight:800;font-size:14px;color:#fff}
.proj-date{font-size:11px;color:#aaa;white-space:nowrap}
.add-pill{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,.1);color:#8ab4f8;border:none;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:800;white-space:nowrap}
.add-pill:hover{background:rgba(255,255,255,.2)}
.add-pill-light{background:#e8f0fe;color:#1a56cc;border:none;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:800;white-space:nowrap}
.add-pill-light:hover{background:#d2e3fc}
.edit-btn{background:rgba(255,255,255,.13);border:none;border-radius:6px;padding:3px 9px;color:#fff;font-size:11px;font-weight:700}
.edit-btn:hover{background:rgba(255,255,255,.22)}
.edit-btn-light{background:#f1f3f4;border:none;border-radius:5px;padding:2px 8px;color:#5f6368;font-size:10px;font-weight:700}
.edit-btn-light:hover{background:#e8eaed}
.sub-row{display:flex;align-items:center;padding:9px 14px;gap:9px;background:#f8f9fb;border-bottom:1px solid #e8eaed}
.sub-num{font-size:10px;background:#e8eaed;color:#5f6368;padding:1px 6px;border-radius:5px;font-weight:700}
.sub-nome{flex:1;font-weight:700;font-size:13px;color:#202124}
.act-row{display:flex;align-items:center;gap:8px;background:#fff;border-bottom:1px solid #f1f3f4}
.act-num{font-size:10px;color:#bdc1c6;font-weight:600;min-width:56px}
.act-nome{flex:1;font-size:12px;color:#3c4043}
.act-date{font-size:10px;color:#9aa0a6;white-space:nowrap}
.edit-panel{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:10px;align-items:end;padding:12px 14px;border-bottom:1px solid #e0e3e8;background:#f8f9fb}
.edit-panel-dark{background:#122840}
.edit-panel label{font-size:10px;font-weight:700;display:block;margin-bottom:3px;color:#5f6368}
.edit-panel-dark label{color:#aaa}
.edit-panel input,.edit-panel select,.edit-panel textarea{width:100%;padding:6px 8px;border:1px solid #dadce0;border-radius:6px;font-size:12px}
.edit-panel-dark input,.edit-panel-dark select,.edit-panel-dark textarea{background:#1e3a55;color:#eee;border-color:#2a5070}
.edit-full{grid-column:1/-1}
.save-btn{background:#34a853;color:#fff;border:none;border-radius:6px;padding:7px 13px;font-weight:800;font-size:12px}
.cancel-btn{background:#e8eaed;border:none;border-radius:6px;padding:7px 10px;font-size:12px}
.add-form{display:grid;grid-template-columns:100px 1fr 120px 120px 140px;gap:8px;align-items:end;padding:12px 14px;border-bottom:1px solid #c8d6e8;border-left:3px solid #4285f4;background:#f0f7ff}
.add-form-dark{background:#0f2236;border-left-color:#4285f4}
.add-form label{font-size:10px;font-weight:700;display:block;margin-bottom:3px;color:#5f6368}
.add-form-dark label{color:#aaa}
.add-form input,.add-form select{width:100%;padding:6px 8px;border:1px solid #dadce0;border-radius:6px;font-size:12px}
.add-form-dark input,.add-form-dark select{background:#1a3a55;color:#eee;border-color:#2a5070}
.add-form-btns{grid-column:1/-1;display:flex;gap:8px;margin-top:4px}
.add-confirm{background:#4285f4;color:#fff;border:none;border-radius:6px;padding:6px 16px;font-weight:800;font-size:12px}
.filter-box{background:#fff;border:1px solid #e0e3e8;border-radius:10px;padding:12px 16px;margin-bottom:12px}
.filter-box-title{font-size:12px;font-weight:700;color:#5f6368;margin-bottom:8px}
.filter-checks{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.fcheck{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 10px;border-radius:20px;border:1.5px solid #e0e3e8;background:#f8f9fb;transition:all .15s;user-select:none}
.fcheck input{width:13px;height:13px;cursor:pointer}
.fcheck span{font-size:12px;font-weight:600;color:#9aa0a6}
.fcheck.checked span{color:#1c1e21}
.new-proj-btn{background:#4285f4;color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:12px;font-weight:800}
.new-proj-btn:hover{background:#3367d6}
.proj-wrap{margin-bottom:12px}
.tree-container{border:1px solid #e0e3e8;border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
.toggle-btn{background:none;border:none;font-size:13px;padding:0;font-weight:900;min-width:18px}
.av-chip{display:inline-flex;align-items:center;gap:4px;background:#f1f3f4;border-radius:20px;padding:1px 7px 1px 1px;white-space:nowrap}
.av-circle{border-radius:50%;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:800}
.av-name{font-size:10px;font-weight:600;color:#3c4043}
.resp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.resp-card{background:#fff;border-radius:14px;border:1px solid #e0e3e8;overflow:hidden}
.resp-card-head{padding:14px 16px 10px;border-bottom:1px solid #f1f3f4}
.resp-card-info{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.resp-av{width:40px;height:40px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;flex-shrink:0}
.resp-name{font-weight:800;font-size:14px}
.resp-sub{font-size:11px;color:#9aa0a6}
.resp-pct{font-weight:900;font-size:18px}
.resp-pills{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.resp-pill{border-radius:10px;padding:1px 8px;font-size:10px;font-weight:700}
.resp-list{max-height:260px;overflow-y:auto}
.resp-item{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid #f8f9fb}
.resp-item-num{font-size:10px;color:#bdc1c6;font-weight:600;min-width:44px}
.resp-item-nome{flex:1;font-size:12px;color:#3c4043;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.resp-item-date{font-size:10px;color:#9aa0a6;white-space:nowrap}
.alert-card{background:#fff;border-radius:11px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.empty{background:#fff;border-radius:12px;padding:32px;text-align:center;color:#9aa0a6}
.filters-row{display:flex;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.filters-row .filter-box{flex:1;min-width:200px;margin-bottom:0}
</style>

const EPOCH = new Date(1899,11,30);
function xlDate(s){ if(!s||isNaN(s)) return null; return new Date(EPOCH.getTime()+Math.round(s*86400000)); }
function toSerial(str){ if(!str) return null; return (new Date(str+'T12:00:00')-EPOCH)/86400000; }
function fmt(d){ if(!d) return '—'; return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function daysLeft(d){ if(!d) return null; const t=new Date(); t.setHours(0,0,0,0); return Math.ceil((d-t)/86400000); }
function getProject(n){ return n.split('.')[0]; }
function getSubproject(n){ const p=n.split('.'); return p.length>=2?p[0]+'.'+p[1]:null; }
function isProject(n){ return n.split('.').length===1; }
function isSubproject(n){ return n.split('.').length===2; }
function isAction(n){ return n.split('.').length>=3; }
function nextNum(data,prefix){
  const depth=prefix.split('.').length+1;
  const sibs=data.filter(d=>d.num.split('.').length===depth&&d.num.startsWith(prefix+'.'));
  if(!sibs.length) return prefix+'.1';
  const max=Math.max(...sibs.map(d=>parseInt(d.num.split('.').pop())||0));
  return prefix+'.'+(max+1);
}
function nextProjectNum(data){
  const ns=data.filter(d=>isProject(d.num)).map(d=>parseInt(d.num)).filter(n=>!isNaN(n));
  return ns.length?String(Math.max(...ns)+1):'1';
}
function avatar(name){
  if(!name) return {initials:'?',color:'#9aa0a6'};
  const parts=name.trim().split(' ');
  const ini=parts.length>=2?parts[0][0]+parts[parts.length-1][0]:parts[0].slice(0,2);
  const cols=['#4285f4','#34a853','#fbbc04','#ea4335','#a142f4','#00acc1','#e67c22','#7cb342'];
  let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))%cols.length;
  return {initials:ini.toUpperCase(),color:cols[h]};
}

function alertBadge(item){
  const d=xlDate(item.fim); const dl=daysLeft(d);
  if(item.status==='Concluída'||item.status==='Cancelada') return '';
  if(item.status==='Atrasada') return `<span class="alert-badge" style="background:#fce8e6;color:#c5221f">⚠ ATRASADA</span>`;

  if(dl!==null&&dl<=7) return `<span class="alert-badge" style="background:#fff8e1;color:#b06000">🔔 ${dl}d</span>`;
  if(dl!==null&&dl<=14) return `<span class="alert-badge" style="background:#e8f0fe;color:#1a56cc">📅 ${dl}d</span>`;
  return '';
}

function filterBox(title, items, selectedSet, onToggleAll, onToggleItem, idPrefix) {
  const allChecked = selectedSet.size === 0 || selectedSet.size === items.length;
  let html = `<div class="filter-box">
    <div class="filter-box-title">${title}</div>
    <div class="filter-checks">
      <label class="fcheck ${allChecked?'checked':''}" style="${allChecked?'background:#e8f0fe;border-color:#4285f4;':''}">
        <input type="checkbox" ${allChecked?'checked':''} onchange="${onToggleAll}" style="accent-color:#4285f4">
        <span style="${allChecked?'color:#1a56cc;font-weight:700':''}">Todos</span>
      </label>`;
  items.forEach(item => {
    const isStatus = !!SC[item];
    const c = SC[item];
    const checked = selectedSet.size === 0 || selectedSet.has(item);
    const av = isStatus ? null : avatar(item);
    const bg = checked ? (c ? c.bg : '#f0f4ff') : '#f8f9fb';
    const border = checked ? (c ? c.dot : (av ? av.color : '#4285f4')) : '#e0e3e8';
    const accentColor = c ? c.dot : (av ? av.color : '#4285f4');
    const txtColor = checked ? (c ? c.tx : '#1c1e21') : '#9aa0a6';
    const avatarHtml = av ? `<span style="width:16px;height:16px;border-radius:50%;background:${av.color};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;flex-shrink:0">${av.initials}</span>` : '';
    html += `<label class="fcheck ${checked?'checked':''}" style="background:${bg};border-color:${border}">
      <input type="checkbox" ${checked?'checked':''} onchange="${onToggleItem(item)}" style="accent-color:${accentColor}">
      ${avatarHtml}<span style="color:${txtColor};font-weight:${checked?'700':'600'}">${esc(item)}</span>
    </label>`;
  });
  html += `</div></div>`;
  return html;
}

function highlightText(text, search){
  if(!search) return esc(text);
  const idx = text.toLowerCase().indexOf(search.toLowerCase());
  if(idx === -1) return esc(text);
  const before = esc(text.slice(0, idx));
  const match  = esc(text.slice(idx, idx + search.length));
  const after  = esc(text.slice(idx + search.length));
  return before + `<mark style="background:#fff176;color:#1c1e21;border-radius:2px;padding:0 1px">${match}</mark>` + after;
}

    const newFim=toSerial(fim);
    if(old.status!==status) changes.push({campo:'Status', de:old.status||'—', para:status||'—'});
    if(Math.round((old.pct||0)*100)!==Math.round(pct*100)) changes.push({campo:'% Concluída', de:Math.round((old.pct||0)*100)+'%', para:Math.round(pct*100)+'%'});
    if((old.fim||null)!==(newFim||null)){
      const dOld=xlDate(old.fim); const dNew=xlDate(newFim);
      changes.push({campo:'Prazo', de:dOld?dOld.toLocaleDateString('pt-BR'):'—', para:dNew?dNew.toLocaleDateString('pt-BR'):'—'});
    }
    if((old.resp||'')!==(resp||'')) changes.push({campo:'Responsável', de:old.resp||'—', para:resp||'—'});
    if((old.notas||'')!==(notas||'')) changes.push({campo:'Notas', de:old.notas||'—', para:notas||'—'});
    if(changes.length) logChange('ALTERAÇÃO', old, changes);
  }
  DATA=DATA.map(d=>d.id!==id?d:{...d,status,pct,fim:toSerial(fim),resp,notas});
  EDIT_ID=null; save(); toast('Salvo!'); render();
}
function cancelEdit(){ EDIT_ID=null; render(); }
function updatePctLabel(id,val){ const el=document.getElementById('pct-lbl-'+id); if(el) el.textContent=val; }

function openAdd(type,prefix){
  if(ADD_CTX&&ADD_CTX.type===type&&ADD_CTX.prefix===prefix){ ADD_CTX=null; render(); return; }
  ADD_CTX={type,prefix}; EDIT_ID=null; render();
  setTimeout(()=>{ const el=document.getElementById(`add-nome-${type}-${prefix}`); if(el) el.focus(); },50);
}
function cancelAdd(){ ADD_CTX=null; render(); }
function confirmAdd(type,prefix){
  const nome=(document.getElementById(`add-nome-${type}-${prefix}`)?.value||'').trim();
  if(!nome){ toast('Informe o nome','err'); return; }
  const num=(document.getElementById(`add-num-${type}-${prefix}`)?.value||'').trim();
  const status=document.getElementById(`add-status-${type}-${prefix}`)?.value||'Não iniciada';
  const fim=document.getElementById(`add-fim-${type}-${prefix}`)?.value||'';
  const resp=document.getElementById(`add-resp-${type}-${prefix}`)?.value||'';
  const tipo_sel=document.getElementById(`add-tipo-${type}-${prefix}`)?.value||'governanca';
  const newItem={id:Date.now(),num,nome,status,pct:0,ini:null,fim:toSerial(fim),resp,notas:'',tipo:tipo_sel};
  DATA=[...DATA,newItem];
  logChange('INCLUSÃO', newItem, [{campo:'Status', de:'—', para:newItem.status},{campo:'Responsável', de:'—', para:newItem.resp||'—'}]);
  if(isSubproject(num)) EXPANDED['p_'+getProject(num)]=true;
  if(isAction(num)){ EXPANDED['p_'+getProject(num)]=true; EXPANDED['s_'+getSubproject(num)]=true; }
  ADD_CTX=null; save(); toast(`"${nome}" adicionado!`); render();
}
function toggle(key){ EXPANDED[key]=!EXPANDED[key]; render(); }
function setView(v){ VIEW=v; render(); }

function renderList(){
  const names = allRespNames();
  // apply filters
  const statusActive = FL_STATUS.size === 0 || FL_STATUS.size === ALL_STATUSES.length ? new Set(ALL_STATUSES) : FL_STATUS;
  const respActive   = FL_RESP.size === 0;

  // filter at item level - show project if ANY child matches
  function itemVisible(d){
    if(!statusActive.has(d.status)) return false;
    if(!respActive && !FL_RESP.has(d.resp||'')) return false;
    if(FL_SEARCH){
      const haystack = (d.num+' '+d.nome+' '+(d.resp||'')+' '+(d.notas||'')).toLowerCase();
      if(!haystack.includes(FL_SEARCH)) return false;
    }
    if(FL_TIPO !== 'all'){
      const projTipo = (DATA.find(x=>x.num===getProject(d.num))?.tipo)||'governanca';
      if(projTipo !== FL_TIPO) return false;
    }
    if(FL_TIPO !== 'all'){
      const projTipo = (DATA.find(x=>x.num===getProject(d.num))?.tipo)||'governanca';
      if(projTipo !== FL_TIPO) return false;
    }
    return true;
  }
  // project is visible if it matches OR any child matches
  function projVisible(pnum){
    const proj = DATA.find(d=>d.num===pnum);
    if(!proj) return false;
    if(FL_SEARCH){
      const allKids = DATA.filter(d=>getProject(d.num)===pnum);
      return itemVisible(proj) || allKids.some(d=>itemVisible(d));
    }
    const allKids = DATA.filter(d=>getProject(d.num)===pnum);
    return allKids.some(d=>itemVisible(d)) || itemVisible(proj);
  }

  const projects=DATA.filter(d=>isProject(d.num));
  const projNums=[...new Set(DATA.filter(d=>isProject(d.num)).map(d=>d.num))].sort((a,b)=>+a-+b);

  // filter boxes
  const statusBox = filterBox(
    'Status',
    ALL_STATUSES,
    FL_STATUS.size === ALL_STATUSES.length ? new Set() : FL_STATUS,
    "toggleListStatus('all')",
    s => `toggleListStatus('${s}')`,
    'fl'
  );
  const respBox = names.length ? filterBox(
    'Responsável',
    names,
    FL_RESP,
    "toggleListResp('all')",
    r => `toggleListResp('${r.replace(/'/g,"\\'")}')`,
    'flr'
  ) : '';

  let html=`<div class="filters-row">${statusBox}${respBox}</div>
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    <div style="flex:1;min-width:220px;position:relative">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9aa0a6;font-size:14px;pointer-events:none">🔍</span>
      <input id="search-input" type="text" value="${FL_SEARCH}"
        oninput="setSearch(this.value)"
        placeholder="Buscar por palavra-chave…"

      ${FL_SEARCH?`<button onclick="clearSearch()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9aa0a6;font-size:14px;padding:0">✕</button>`:''}
    </div>
    <button onclick="exportToExcel()" style="background:#1a7a34;color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:12px;font-weight:800;cursor:pointer">⬇ Excel</button>
    <button class="new-proj-btn" style="margin:0" onclick="openAdd('projeto','_root')">+ Novo Projeto</button>
  </div>
  ${FL_SEARCH ? `<div style="font-size:12px;color:#1a56cc;font-weight:600;margin-bottom:10px;padding:6px 12px;background:#e8f0fe;border-radius:8px;display:inline-block">🔍 Buscando: "<strong>${FL_SEARCH}</strong>"</div>` : ''}

    <button onclick="setTipo('governanca')" style="padding:4px 14px;border:none;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;background:${FL_TIPO==='governanca'?'#1a3a5c':'#f1f3f4'};color:${FL_TIPO==='governanca'?'#fff':'#5f6368'}">GOVERNANÇA</button>

    projNums.forEach(pnum=>{
      if(CANCELED_PROJECTS.has(pnum)) return;
      const allKids = DATA.filter(d=>getProject(d.num)===pnum);
      if(allKids.some(d=>itemVisible(d))){
        EXPANDED['p_'+pnum] = true;
        DATA.filter(d=>isSubproject(d.num)&&getProject(d.num)===pnum).forEach(s=>{
          const acts = DATA.filter(a=>isAction(a.num)&&getSubproject(a.num)===s.num);
          if(acts.some(a=>itemVisible(a))) EXPANDED['s_'+s.num] = true;
        });

    });

  let anyVisible=false;

    // check if project itself or any child passes filter
    const allKids=DATA.filter(d=>getProject(d.num)===pnum);

}

function renderResp(){
  const withResp=DATA.filter(d=>d.resp&&d.resp.trim());
  const noResp=DATA.filter(d=>(!d.resp||!d.resp.trim())&&d.status!=='Concluída'&&d.status!=='Cancelada');
  const map={};
  withResp.forEach(d=>{ const k=d.resp.trim(); if(!map[k]) map[k]=[]; map[k].push(d); });
  const names=Object.keys(map).sort();

  const statusBox = filterBox('Status', ALL_STATUSES, FR_STATUS.size===ALL_STATUSES.length?new Set():FR_STATUS,
    "toggleRespStatus('all')", s=>`toggleRespStatus('${s}')`, 'fr');
  const nameBox = names.length ? filterBox('Responsável', names, FR_RESP,
    "toggleRespName('all')", r=>`toggleRespName('${r.replace(/'/g,"\\'")}')`, 'frn') : '';

  let html=`<div style="font-weight:800;font-size:16px;margin-bottom:14px">👥 Painel por Responsável</div>
  <div class="filters-row">${statusBox}${nameBox}</div>`;

  const statOrder=['Atrasada','Em andamento','Não iniciada','Standby','Concluída','Cancelada'];
  const statusActive = FR_STATUS.size===0||FR_STATUS.size===ALL_STATUSES.length ? new Set(ALL_STATUSES) : FR_STATUS;
  const nameActive   = FR_RESP.size===0;

  const visibleNames = nameActive ? names : names.filter(n=>FR_RESP.has(n));

  if(!visibleNames.length){
    html+=`<div class="empty">Nenhum responsável atribuído ainda. Use ✏ em cada item para atribuir.</div>`;
    return html;
  }

  // ── CHART ──────────────────────────────────────────────────────
  const statColors={
    'Atrasada':'#ea4335','Em andamento':'#4285f4','Não iniciada':'#9aa0a6',
    'Standby':'#fbbc04','Concluída':'#34a853','Cancelada':'#ab47bc'
  };
  const BAR_H = 28;
  const GAP   = 10;
  const LABEL_W = 110;
  const CHART_W = 520;
  const totalH = visibleNames.length * (BAR_H + GAP) + 30;

  // max items for scale
  const maxItems = Math.max(...visibleNames.map(n=>map[n].length));

  let bars = '';
  visibleNames.forEach((name, idx) => {
    const items = map[name];
    const total = items.length;
    const y = idx * (BAR_H + GAP) + 24;

    let x = 0;
    statOrder.forEach(st => {
      const cnt = items.filter(i=>i.status===st).length;
      if(!cnt) return;
      const w = Math.round((cnt / maxItems) * CHART_W);
      const col = statColors[st] || '#9aa0a6';
      const safeKey = name.replace(/[^a-zA-Z0-9]/g,'_');
      bars += `<rect x="${LABEL_W + x}" y="${y}" width="${w}" height="${BAR_H}" fill="${col}" opacity="${statusActive.has(st)?1:.25}"
        rx="3" style="cursor:pointer;transition:opacity .2s"
        onclick="toggleChartDrill('${safeKey}','${st}')"
        onmouseover="this.style.opacity='0.8'"
        onmouseout="this.style.opacity='${statusActive.has(st)?1:.25}'">
        <title>${esc(name)} · ${esc(st)}: ${cnt} itens</title>
      </rect>`;
      if(w > 22) {
        bars += `<text x="${LABEL_W + x + w/2}" y="${y + BAR_H/2 + 4}" text-anchor="middle" fill="white" font-size="11" font-weight="700" pointer-events="none" style="cursor:pointer" onclick="toggleChartDrill('${safeKey}','${st}')">${cnt}</text>`;
      }
      x += w;
    });

    // label
    const av = avatar(name);
    bars += `<text x="${LABEL_W - 6}" y="${y + BAR_H/2 + 4}" text-anchor="end" fill="#1c1e21" font-size="12" font-weight="700">${esc(name.split(' ')[0])}</text>`;
    // total label
    bars += `<text x="${LABEL_W + x + 6}" y="${y + BAR_H/2 + 4}" fill="#5f6368" font-size="11">${total}</text>`;
  });

  // legend
  let legend = '';
  let lx = LABEL_W;
  statOrder.forEach(st => {
    const col = statColors[st];
    legend += `<rect x="${lx}" y="2" width="12" height="12" fill="${col}" rx="2" opacity="${statusActive.has(st)?1:.3}"/>`;
    legend += `<text x="${lx+16}" y="12" fill="#5f6368" font-size="11">${esc(st)}</text>`;
    lx += st.length * 7 + 28;
  });

  html += `<div class="card" style="overflow-x:auto;margin-bottom:16px">
    <div class="card-title">Distribuição de itens por responsável</div>
    <svg width="${LABEL_W + CHART_W + 60}" height="${totalH + 20}" style="display:block">
      ${legend}
      ${bars}
    </svg>
    <div style="font-size:11px;color:#9aa0a6;margin-top:8px">Clique em uma barra para ver os itens daquele status</div>
  </div>`;

  // ── DRILL DOWN ─────────────────────────────────────────────────
  if(window.CHART_DRILL){
    const {nameKey, status} = window.CHART_DRILL;
    const drillName = visibleNames.find(n=>n.replace(/[^a-zA-Z0-9]/g,'_')===nameKey);
    if(drillName && map[drillName]){
      const drillItems = map[drillName].filter(i=>i.status===status);
      const c = SC[status]||SC['Não iniciada'];
      let rows = drillItems.map(item=>`<div class="resp-item">
        <span style="width:6px;height:6px;border-radius:50%;background:${c.dot};flex-shrink:0;display:inline-block"></span>
        <span class="resp-item-num">${esc(item.num)}</span>
        <span class="resp-item-nome" title="${esc(item.nome)}">${esc(item.nome)}</span>
        ${xlDate(item.fim)?`<span class="resp-item-date">${fmt(xlDate(item.fim))}</span>`:''}
        ${alertBadge(item)}
      </div>`).join('');

      html += `<div class="card" style="border:2px solid ${c.dot}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div>
            <span style="font-weight:800;font-size:14px">${esc(drillName)}</span>
            <span class="badge" style="background:${c.bg};color:${c.tx};margin-left:8px"><span class="badge-dot" style="background:${c.dot}"></span>${esc(status)}</span>
            <span style="font-size:12px;color:#9aa0a6;margin-left:8px">${drillItems.length} itens</span>
          </div>
          <button onclick="window.CHART_DRILL=null;render()" style="background:#f1f3f4;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:700">✕ Fechar</button>
        </div>
        <div>${rows}</div>
      </div>`;
    }
  }

  // ── CARDS ──────────────────────────────────────────────────────
  html+=`<div class="resp-grid">`;
  let anyCard=false;
  visibleNames.forEach(name=>{
    const items=map[name];
    const filtered=items.filter(i=>statusActive.has(i.status));
    if(!filtered.length) return;
    anyCard=true;
    const done=items.filter(i=>i.status==='Concluída').length;
    const late=items.filter(i=>i.status==='Atrasada').length;
    const pct=items.length?Math.round(done/items.length*100):0;
    const av=avatar(name);
    const col=pct===100?'#34a853':late>0?'#ea4335':'#4285f4';
    const sorted=[...filtered].sort((a,b)=>statOrder.indexOf(a.status)-statOrder.indexOf(b.status));
    let pills='';
    [['Atrasada','#fce8e6','#c5221f'],['Em andamento','#e8f0fe','#1a56cc'],['Não iniciada','#f1f3f4','#5f6368'],['Standby','#fff8e1','#b06000'],['Concluída','#e6f4ea','#1a7a34'],['Cancelada','#f3e8fd','#7b1fa2']].forEach(([st,bg,tx])=>{
      const cnt=items.filter(i=>i.status===st).length;
      if(cnt) pills+=`<span class="resp-pill" style="background:${bg};color:${tx};cursor:pointer" onclick="toggleChartDrill('${name.replace(/[^a-zA-Z0-9]/g,'_')}','${st}')">${esc(st)}: ${cnt}</span>`;
    });
    let itemRows='';
    sorted.forEach(item=>{
      const fim=xlDate(item.fim); const c=SC[item.status]||SC['Não iniciada'];
      itemRows+=`<div class="resp-item">
        <span style="width:6px;height:6px;border-radius:50%;background:${c.dot};flex-shrink:0;display:inline-block"></span>
        <span class="resp-item-num">${esc(item.num)}</span>
        <span class="resp-item-nome" title="${esc(item.nome)}">${esc(item.nome)}</span>
        ${fim?`<span class="resp-item-date">${fmt(fim)}</span>`:''}
        ${alertBadge(item)}
      </div>`;
    });
    html+=`<div class="resp-card">
      <div class="resp-card-head">
        <div class="resp-card-info">
          <div class="resp-av" style="background:${av.color}">${av.initials}</div>
          <div style="flex:1"><div class="resp-name">${esc(name)}</div>
          <div class="resp-sub">${filtered.length} de ${items.length} itens · ${done} concluídos${late>0?` · ⚠ ${late} atrasados`:''}</div></div>
          <div class="resp-pct" style="color:${col}">${pct}%</div>
        </div>
        <div style="height:6px;background:#f1f3f4;border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${col};border-radius:3px"></div></div>
        <div class="resp-pills">${pills}</div>
      </div>
      <div class="resp-list">${itemRows}</div>
    </div>`;
  });
  html+=`</div>`;

  if(!anyCard) html+=`<div class="empty" style="margin-top:12px">Nenhum resultado com esses filtros.</div>`;

  if(noResp.length&&nameActive){
    const noRespFiltered=noResp.filter(d=>statusActive.has(d.status));
    if(noRespFiltered.length){
      let rows='';
      noRespFiltered.forEach(item=>{
        const c=SC[item.status]||SC['Não iniciada'];
        rows+=`<div class="resp-item"><span style="width:6px;height:6px;border-radius:50%;background:${c.dot};flex-shrink:0;display:inline-block"></span><span class="resp-item-num">${esc(item.num)}</span><span class="resp-item-nome">${esc(item.nome)}</span>${badge(item.status)}</div>`;
      });
      html+=`<div style="margin-top:16px;background:#fff;border-radius:14px;border:1px solid #e0e3e8;overflow:hidden">
        <div style="padding:12px 16px;border-bottom:1px solid #f1f3f4;font-weight:700;font-size:13px;color:#9aa0a6">Sem responsável — ${noRespFiltered.length} itens ativos</div>
        <div style="max-height:200px;overflow-y:auto">${rows}</div>
      </div>`;
    }
  }
  return html;
}


function renderCanceled(){
  const canceledProjs = DATA.filter(d => isProject(d.num) && CANCELED_PROJECTS.has(d.num));
  const allProjNums = [...new Set(DATA.filter(d=>isProject(d.num)).map(d=>d.num))];

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div style="font-weight:800;font-size:16px">🚫 Projetos Cancelados</div>
    <div style="font-size:12px;color:#9aa0a6">${canceledProjs.length} projeto(s) nesta aba</div>
  </div>`;

  if(!canceledProjs.length){
    html += `<div class="empty">Nenhum projeto cancelado.</div>`;
    return html;
  }

  canceledProjs.forEach(proj => {
    const pnum = proj.num;
    const subNums = [...new Set(DATA.filter(d=>isSubproject(d.num)&&getProject(d.num)===pnum).map(d=>d.num))].sort();
    const allKids = DATA.filter(d=>getProject(d.num)===pnum);
    const done = allKids.filter(d=>d.status==='Concluída').length;
    const open = EXPANDED['pc_'+pnum] === true;
    const br = open ? '12px 12px 0 0' : '12px';

    // status breakdown pills
    const statCounts={};
    allKids.forEach(k=>{ statCounts[k.status]=(statCounts[k.status]||0)+1; });
    const statPills=[['Atrasada','#fce8e6','#c5221f'],['Em andamento','#e8f0fe','#1a56cc'],['Não iniciada','#f1f3f4','#5f6368'],['Standby','#fff8e1','#b06000'],['Concluída','#e6f4ea','#1a7a34'],['Cancelada','#f3e8fd','#7b1fa2']]
      .filter(([st])=>statCounts[st])
      .map(([st,bg,tx])=>`<span style="background:${bg};color:${tx};border-radius:10px;padding:2px 10px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:4px">${esc(st)}: ${statCounts[st]}</span>`)
      .join('');

    html += `<div class="proj-wrap">
      <div style="background:#4a1a4a;border-radius:${br};overflow:hidden">
        <div class="proj-row" style="background:#4a1a4a" onclick="toggle('pc_${pnum}')">
          <button class="toggle-btn" style="color:#fff">${open?'▾':'▸'}</button>
          <span class="proj-num">${esc(proj.num)}</span>
          <span class="proj-nome">${esc(proj.nome)}</span>
          ${progBar(proj.pct)}
          ${badge(proj.status)}
          <span class="proj-date">${fmt(xlDate(proj.fim))}</span>
          <button class="edit-btn" onclick="event.stopPropagation();startEdit(${proj.id})">✏</button>
          <button onclick="event.stopPropagation();restoreProject('${pnum}')" style="background:rgba(255,255,255,.13);border:none;border-radius:6px;padding:3px 9px;color:#fff;font-size:10px;font-weight:700;cursor:pointer" title="Mover de volta para Projetos">↩ Restaurar</button>
        </div>
        ${EDIT_ID===proj.id?editPanelHtml(EDIT_DRAFT,true,14):''}
      </div>`;

    if(open){
      html += `<div class="tree-container">`;
      subNums.forEach(snum=>{
        const sub=DATA.find(d=>d.num===snum); if(!sub) return;
        const acts=DATA.filter(d=>isAction(d.num)&&getSubproject(d.num)===snum);
        const subOpen=EXPANDED['pcs_'+snum]===true;
        html+=`<div>
          <div class="sub-row" onclick="toggle('pcs_${snum}')">
            <div style="width:18px"></div>
            <button class="toggle-btn" style="color:#5f6368;min-width:16px">${subOpen?'▾':'▸'}</button>
            <span class="sub-num">${esc(sub.num)}</span>
            <span class="sub-nome">${highlightText(sub.nome,FL_SEARCH)}</span>
            ${avChip(sub.resp)}${progBar(sub.pct)}${badge(sub.status)}
            <span class="act-date">${fmt(xlDate(sub.fim))}</span>
            <button class="edit-btn-light" onclick="event.stopPropagation();startEdit(${sub.id})">✏</button>
          </div>
          ${EDIT_ID===sub.id?editPanelHtml(EDIT_DRAFT,false,46):''}`;
        if(subOpen){
          acts.forEach(a=>{
            html+=`<div>
              <div class="act-row" id="item-${a.id}" style="padding:7px 14px 7px 60px">
                <span class="act-num">${esc(a.num)}</span>
                <span class="act-nome">${highlightText(a.nome,FL_SEARCH)}</span>
                ${avChip(a.resp)}${progBar(a.pct)}${badge(a.status)}
                <span class="act-date">${fmt(xlDate(a.fim))}</span>
                <button class="edit-btn-light" onclick="startEdit(${a.id})">✏</button>
                <button onclick="deleteItem(${a.id})" style="background:#fce8e6;border:none;border-radius:5px;padding:2px 7px;color:#c5221f;font-size:10px;font-weight:700;cursor:pointer" title="Excluir">🗑</button>
              </div>
              ${EDIT_ID===a.id?editPanelHtml(EDIT_DRAFT,false,60):''}
            </div>`;
          });
        }
        html+=`</div>`;
      });

      // direct actions
      const directActs=DATA.filter(d=>isAction(d.num)&&getProject(d.num)===pnum&&d.num.split('.').length===3&&!subNums.includes(getSubproject(d.num)));
      directActs.forEach(a=>{
        html+=`<div>
          <div class="act-row" id="item-${a.id}" style="padding:7px 14px 7px 46px">
            <span class="act-num">${esc(a.num)}</span>
            <span class="act-nome">${highlightText(a.nome,FL_SEARCH)}</span>
            ${avChip(a.resp)}${progBar(a.pct)}${badge(a.status)}
            <span class="act-date">${fmt(xlDate(a.fim))}</span>
            <button class="edit-btn-light" onclick="startEdit(${a.id})">✏</button>
            <button onclick="deleteItem(${a.id})" style="background:#fce8e6;border:none;border-radius:5px;padding:2px 7px;color:#c5221f;font-size:10px;font-weight:700;cursor:pointer" title="Excluir">🗑</button>
          </div>
          ${EDIT_ID===a.id?editPanelHtml(EDIT_DRAFT,false,46):''}
        </div>`;
      });
      html += `</div>`;
    }

    // summary bar
    html += `<div style="background:#f9f0f9;border:1px solid #e8d4e8;border-top:none;border-radius:0 0 12px 12px;padding:8px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      ${statPills}
      <span style="font-size:11px;color:#9aa0a6;margin-left:auto">${done}/${allKids.length} itens concluídos</span>
    </div>`;

    html += `</div>`;
  });

  return html;
}

function restoreProject(pnum){
  CANCELED_PROJECTS.delete(pnum);
  save();

function renderCronograma(){
  const today = new Date(); today.setHours(0,0,0,0);
  const allNames = allRespNames();

  // Only active items (Em andamento + Não iniciada + Atrasada), with a fim date
  const itemsWithDate = DATA.filter(d => {
    if(!['Em andamento','Não iniciada','Atrasada'].includes(d.status)) return false;
    if(CANCELED_PROJECTS.has(getProject(d.num))) return false;
    return d.fim && !isNaN(d.fim);
  }).map(d => ({...d, fimDate: xlDate(d.fim)}))
    .sort((a,b) => a.fimDate - b.fimDate);

  // Apply resp filter
  const respOk = CRONO_RESP.size === 0;
  const filtered = itemsWithDate.filter(d => {
    if(!respOk && (!d.resp || !CRONO_RESP.has(d.resp.trim()))) return false;
    return true;
  });

  // Group: overdue, today, this week, next periods
  const overdue   = filtered.filter(d => daysLeft(d.fimDate) < 0);
  const upcoming  = filtered.filter(d => daysLeft(d.fimDate) >= 0);

  // For upcoming: group by week blocks
  function weekLabel(d){
    const dl = daysLeft(d);
    if(dl === 0) return 'Hoje';
    if(dl === 1) return 'Amanhã';
    if(dl <= 7)  return 'Próximos 7 dias';
    if(dl <= 14) return 'Próximos 14 dias';
    if(dl <= 30) return 'Próximos 30 dias';
    if(dl <= 60) return 'Próximos 60 dias';
    return 'Mais de 60 dias';
  }
  const groupOrder = ['Hoje','Amanhã','Próximos 7 dias','Próximos 14 dias','Próximos 30 dias','Próximos 60 dias','Mais de 60 dias'];

  // Build groups
  const groups = {};
  upcoming.forEach(d => {
    const lbl = weekLabel(d.fimDate);
    if(!groups[lbl]) groups[lbl] = [];
    groups[lbl].push(d);
  });

  // Filters UI
  const nameBox = allNames.length ? filterBox('Responsável', allNames, CRONO_RESP,
    "toggleCronoResp('all')", r=>`toggleCronoResp('${r.replace(/'/g,"\\'")}')`, 'cr') : '';

  const dayBtns = [7,14,30,60,999].map(d => {
    const lbl = d === 999 ? 'Todos' : `${d} dias`;
    const active = CRONO_DAYS === d;
    return `<button onclick="setCronoDays(${d})" style="padding:4px 14px;border:none;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;background:${active?'#1a3a5c':'#f1f3f4'};color:${active?'#fff':'#5f6368'}">${lbl}</button>`;
  }).join('');

  let html = `<div style="font-weight:800;font-size:16px;margin-bottom:14px">📅 Cronograma</div>
  <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-start">
    ${allNames.length ? `<div style="flex:1;min-width:200px">${nameBox}</div>` : ''}
    <div style="background:#fff;border:1px solid #e0e3e8;border-radius:10px;padding:12px 16px;flex-shrink:0">
      <div style="font-size:12px;font-weight:700;color:#5f6368;margin-bottom:8px">Período:</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${dayBtns}</div>
    </div>
  </div>`;

  // OVERDUE section
  const overdueFiltered = overdue.filter(d => CRONO_DAYS === 999 || true); // always show overdue
  if(overdueFiltered.length){
    html += `<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:4px;height:20px;background:#ea4335;border-radius:2px"></div>
        <span style="font-weight:800;font-size:13px;color:#c5221f">⚠ Atrasados / Vencidos</span>
        <span style="background:#fce8e6;color:#c5221f;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700">${overdueFiltered.length}</span>
      </div>
      <div style="border-left:3px solid #ea4335;margin-left:6px;padding-left:14px;display:flex;flex-direction:column;gap:6px">
        ${overdueFiltered.map(item => cronoItemHtml(item, today)).join('')}
      </div>
    </div>`;
  }

  // UPCOMING groups
  const maxDays = CRONO_DAYS;
  groupOrder.forEach(lbl => {
    if(!groups[lbl]) return;
    const items = groups[lbl];
    // filter by selected period
    const periodMax = {
      'Hoje':0,'Amanhã':1,'Próximos 7 dias':7,'Próximos 14 dias':14,
      'Próximos 30 dias':30,'Próximos 60 dias':60,'Mais de 60 dias':999
    }[lbl];
    if(maxDays !== 999 && periodMax > maxDays) return;

    const dotColor = lbl==='Hoje'?'#ea4335':lbl==='Amanhã'?'#fbbc04':lbl.includes('7')||lbl.includes('14')?'#4285f4':'#34a853';
    html += `<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:4px;height:20px;background:${dotColor};border-radius:2px"></div>
        <span style="font-weight:800;font-size:13px">${lbl}</span>
        <span style="background:#f1f3f4;color:#5f6368;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700">${items.length}</span>
      </div>
      <div style="border-left:3px solid ${dotColor};margin-left:6px;padding-left:14px;display:flex;flex-direction:column;gap:6px">
        ${items.map(item => cronoItemHtml(item, today)).join('')}
      </div>
    </div>`;
  });

  if(!overdueFiltered.length && !Object.keys(groups).length){
    html += `<div class="empty">Nenhuma atividade encontrada para o período selecionado.</div>`;
  }

  return html;
}

function cronoItemHtml(item, today){
  const dl = daysLeft(item.fimDate);
  const c  = SC[item.status] || SC['Não iniciada'];
  const pnum = getProject(item.num);
  const snum = getSubproject(item.num);
  const projName = DATA.find(d => d.num === pnum)?.nome || '';
  const dlLabel = dl < 0 ? `${Math.abs(dl)}d atraso` : dl === 0 ? 'Hoje' : dl === 1 ? 'Amanhã' : `${dl}d`;
  const dlColor = dl < 0 ? '#c5221f' : dl <= 1 ? '#b06000' : dl <= 7 ? '#1a56cc' : '#34a853';
  const dlBg    = dl < 0 ? '#fce8e6' : dl <= 1 ? '#fff8e1' : dl <= 7 ? '#e8f0fe' : '#e6f4ea';

  return `<div
    onclick="goToItem('${pnum}','${snum||''}','${item.id}')"
    title="Abrir na aba Projetos"
    style="background:#fff;border-radius:10px;border:1px solid #e8eaed;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s"
    onmouseover="this.style.boxShadow='0 2px 12px rgba(26,90,204,.15)';this.style.borderColor='#4285f4'"
    onmouseout="this.style.boxShadow='';this.style.borderColor='#e8eaed'">
    <span style="width:8px;height:8px;border-radius:50%;background:${c.dot};flex-shrink:0;display:inline-block"></span>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;font-weight:700;color:#1c1e21;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(item.nome)}</div>
      <div style="font-size:10px;color:#9aa0a6;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <span style="background:#f1f3f4;padding:1px 6px;border-radius:4px;font-weight:600">${esc(item.num)}</span>
        ${projName ? `<span>${esc(projName)}</span>` : ''}
        ${item.resp ? avChip(item.resp, 16) : ''}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      ${badge(item.status)}
      <span style="font-size:11px;color:#5f6368;white-space:nowrap">${fmt(item.fimDate)}</span>
      <span style="background:${dlBg};color:${dlColor};border-radius:10px;padding:2px 8px;font-size:10px;font-weight:800;white-space:nowrap">${dlLabel}</span>
      <span style="font-size:10px;color:#4285f4;font-weight:700">↗</span>
    </div>
  </div>`;
}

function renderHistorico(){
  let HIST_FILTER_TYPE = window.HIST_FILTER_TYPE || 'all';
  let HIST_FILTER_DATE = window.HIST_FILTER_DATE || '';

  const tipos = ['all','INCLUSÃO','ALTERAÇÃO','EXCLUSÃO'];

  // Apply filters
  let entries = AUDIT_LOG;
  if(HIST_FILTER_TYPE !== 'all') entries = entries.filter(e=>e.tipo===HIST_FILTER_TYPE);

          </div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  return html;
}


function exportToExcel(){
  if(typeof XLSX === 'undefined'){
    alert('A biblioteca de exportação Excel não pôde ser carregada.\nVerifique sua conexão com a internet e tente novamente.');
    return;
  }
  const EPOCH = new Date(1899,11,30);

  // Merge DATA with any older localStorage keys so rotina projects are included
  let allData = [...DATA];
  ['paula_v14','paula_v15','paula_v16'].forEach(key=>{
    try{
      const old = localStorage.getItem(key);
      if(!old) return;
      const parsed = JSON.parse(old);
      parsed.forEach(item=>{
        if(!allData.find(d=>d.id===item.id && d.num===item.num)){
          allData.push(item);
        }
      });
    }catch(e){}
  });

  // Build rows
  const rows = [];

  // Header — now includes Tipo
  rows.push([
    'Número','Nome','Nível','Projeto Pai','Tipo','Status','% Concluída',
    'Data Início','Data Prazo','Responsável','Notas'
  ]);

  // Sort by num
  allData.sort((a,b)=>{
    const pa = a.num.split('.').map(n=>n.padStart(4,'0')).join('.');
    const pb = b.num.split('.').map(n=>n.padStart(4,'0')).join('.');
    return pa.localeCompare(pb);
  });

  allData.forEach(d=>{
    if(CANCELED_PROJECTS.has(getProject(d.num))) return;
    const parts = d.num.split('.');
    let nivel = parts.length===1?'Projeto':parts.length===2?'Subprojeto':'Ação';
    const projPai = parts.length>1 ? (allData.find(x=>x.num===parts[0])?.nome||parts[0]) : '';
    const projTipo = (allData.find(x=>x.num===parts[0])?.tipo)||d.tipo||'governanca';
    const tipoLabel = projTipo==='rotina'?'Rotina':'Governança';
    const ini = d.ini ? new Date(EPOCH.getTime()+Math.round(d.ini*86400000)) : null;
    const fim = d.fim ? new Date(EPOCH.getTime()+Math.round(d.fim*86400000)) : null;
    const fmtD = dt => dt ? dt.toLocaleDateString('pt-BR') : '';

    rows.push([
      d.num, d.nome, nivel, projPai, tipoLabel,
      d.status, Math.round((d.pct||0)*100)+'%',
      fmtD(ini), fmtD(fim), d.resp||'', d.notas||''
    ]);
  });

  // Create workbook
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws['!cols'] = [
    {wch:10},{wch:55},{wch:12},{wch:35},{wch:12},{wch:16},{wch:12},
    {wch:14},{wch:14},{wch:20},{wch:40}
  ];

  // Style header
  const headerRange = XLSX.utils.decode_range(ws['!ref']);
  for(let C=headerRange.s.c; C<=headerRange.e.c; C++){
    const cellAddr = XLSX.utils.encode_cell({r:0,c:C});
    if(!ws[cellAddr]) continue;
    ws[cellAddr].s = {
      font:{bold:true,color:{rgb:'FFFFFF'}},
      fill:{fgColor:{rgb:'1A3A5C'}},
      alignment:{horizontal:'center'}
    };
  }
  ws['!freeze'] = {xSplit:0, ySplit:1};
  XLSX.utils.book_append_sheet(wb, ws, 'Projetos');

  // Summary sheet — split by tipo
  const sumRows = [['Tipo','Projeto','Status','Total Itens','Concluídos','Em Andamento','Atrasados','Não Iniciados','% Geral']];
  allData.filter(d=>isProject(d.num)&&!CANCELED_PROJECTS.has(d.num))
    .sort((a,b)=>{
      const ta=a.tipo||'governanca', tb=b.tipo||'governanca';
      if(ta!==tb) return ta.localeCompare(tb);
      return (+a.num)-(+b.num);
    })
    .forEach(p=>{
      const kids = allData.filter(d=>getProject(d.num)===p.num);
      const total=kids.length, done=kids.filter(d=>d.status==='Concluída').length;
      const prog=kids.filter(d=>d.status==='Em andamento').length;
      const late=kids.filter(d=>d.status==='Atrasada').length;
      const notst=kids.filter(d=>d.status==='Não iniciada').length;
      const pct=total?Math.round(done/total*100)+'%':'0%';
      const tipoLabel=(p.tipo||'governanca')==='rotina'?'Rotina':'Governança';
      sumRows.push([tipoLabel, p.num+' — '+p.nome, p.status, total, done, prog, late, notst, pct]);
    });
  const ws2 = XLSX.utils.aoa_to_sheet(sumRows);
  ws2['!cols'] = [{wch:12},{wch:45},{wch:16},{wch:12},{wch:12},{wch:14},{wch:12},{wch:14},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Resumo por Projeto');

  // Download
  const date = new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
  XLSX.writeFile(wb, `backup-projetos-paula-${date}.xlsx`);
  toast('Excel exportado com sucesso!');
}

function exportAudit(){
  let txt = 'RELATÓRIO DE ALTERAÇÕES — PAINEL PAULA ORTOLANI\n';
  txt += '='.repeat(55) + '\n';
  txt += `Gerado em: ${new Date().toLocaleString('pt-BR')}\n`;
  txt += '='.repeat(55) + '\n\n';

  // Group by date
  const byDate = {};
  AUDIT_LOG.forEach(e=>{
    const d=e.data.split(' ')[0];
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(e);
  });
  const dates = Object.keys(byDate).sort((a,b)=>{
    const pa=a.split('/').reverse().join(''), pb=b.split('/').reverse().join('');
    return pb.localeCompare(pa);
  });

  dates.forEach(date=>{
    txt += `\n📅 ${date}\n` + '-'.repeat(40) + '\n';
    byDate[date].forEach(e=>{
      const time = e.data.split(' ')[1]||'';
      txt += `\n[${e.tipo}] ${e.num} — ${e.nome} (${time})\n`;
      if(e.changes && e.changes.length){
        e.changes.forEach(ch=>{
          txt += `  • ${ch.campo}: "${ch.de}" → "${ch.para}"\n`;
        });
      }
    });
  });

  // Download as .txt
  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `historico-alteracoes-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}


// ── PERSISTENT SAVE (embed in HTML file) ─────────────────────────
let _autoSaveTimer = null;
function save(){
  // Save to localStorage immediately
  try{ localStorage.setItem('paula_v17', JSON.stringify(DATA)); }catch(e){}
  // Show saving indicator
  const el = document.getElementById('save-indicator');
  if(el){ el.style.display='flex'; el.textContent='⏳ Salvando...'; el.style.background='#e8f0fe'; el.style.color='#1a56cc'; }
  // Debounce Firebase save - wait 1.5s after last change
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(()=>{ saveToFirebase(); }, 1500);
}

function saveToFirebase(){
  const el = document.getElementById('save-indicator');
  if(el){ el.style.display='flex'; el.textContent='⏳ Salvando...'; el.style.background='#e8f0fe'; el.style.color='#1a56cc'; }
  db.collection('painel').doc('dados').set({
    data: DATA,
    audit: AUDIT_LOG,
    canceled: [...CANCELED_PROJECTS],
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  })
  .then(()=>{
    _autoSaveTimer = null;
    if(el){ el.textContent='✓ Salvo na nuvem'; el.style.background='#e6f4ea'; el.style.color='#1a7a34';
      setTimeout(()=>{ el.style.display='none'; }, 3000); }
  })
  .catch(err=>{
    if(el){ el.textContent='⚠ Erro: '+err.message; el.style.background='#fce8e6'; el.style.color='#c5221f'; }
  });
}


function saveAudit(){
  try{ localStorage.setItem('paula_audit', JSON.stringify(AUDIT_LOG)); }catch(e){}
}

function loadFromFirebase(){
  const el = document.getElementById('save-indicator');
  if(el){ el.style.display='flex'; el.textContent='⏳ Carregando dados da nuvem...'; el.style.background='#e8f0fe'; el.style.color='#1a56cc'; }
  db.collection('painel').doc('dados').get()
  .then(doc=>{
    if(doc.exists){
      const d = doc.data();
      if(d.data && d.data.length > 0){
        DATA = d.data;
        try{ localStorage.setItem('paula_v17', JSON.stringify(DATA)); }catch(e){}
      }
      if(d.audit) AUDIT_LOG = d.audit;
      if(d.canceled) CANCELED_PROJECTS = new Set(d.canceled);
      if(el){ el.textContent='✓ Dados carregados da nuvem'; el.style.background='#e6f4ea'; el.style.color='#1a7a34';
        setTimeout(()=>{ el.style.display='none'; }, 2000); }
      render();
    } else {
      // First time - save current RAW data to Firebase
      if(el){ el.textContent='☁️ Primeira vez - enviando dados para nuvem...'; el.style.background='#fff8e1'; el.style.color='#b06000'; }
      saveToFirebase();
      if(el){ setTimeout(()=>{ el.style.display='none'; }, 3000); }
    }
  })
  .catch(err=>{
    if(el){ el.textContent='⚠ Sem conexão - usando dados locais'; el.style.background='#fff8e1'; el.style.color='#b06000';
      setTimeout(()=>{ el.style.display='none'; }, 3000); }
    render();
  });
}
